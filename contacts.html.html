    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #05070a; color: #eef5ff; font-family: 'Manrope', sans-serif; background: radial-gradient(circle at 20% 30%, #0a0f1a, #03050a); }
        .wrap { max-width: 1300px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 3; }

        .brand { text-decoration: none; }
        .brand .row { font-family: 'Space Grotesk', monospace; font-size: 1.6rem; font-weight: 700; }
        .brand .b { color: white; }

        .links { display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
        .links a { text-decoration: none; color: #ccddf8; font-weight: 500; transition: 0.2s; }
        .links a:hover, .links a.active { color: #3b82f6; text-shadow: 0 0 5px #3b82f6; }
        .nav-cat { background: linear-gradient(95deg, #2563eb, #4f46e5); padding: 8px 20px; border-radius: 40px; color: white !important; font-weight: 600; }
        .page-hero { padding: 70px 0 40px; }
        .kicker { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: #5f8bff; margin-bottom: 20px; }
        h1 { font-size: 3.5rem; font-weight: 700; line-height: 1.2; margin-bottom: 24px; }
        h1 .g { background: linear-gradient(125deg, #60a5fa, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .contacts-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            margin: 50px 0;
        }
        .contact-card {
            background: rgba(12,18,28,0.7);
            border-radius: 28px;
            padding: 30px;
            flex: 1;
            min-width: 250px;
            border: 1px solid rgba(59,130,246,0.3);
        }
        .contact-card h3 { font-size: 1.5rem; margin-bottom: 20px; color: #3b82f6; }
        .contact-card p { margin: 12px 0; color: #ccddf8; }
        footer { margin: 70px 0 30px; text-align: center; color: #6b7b9b; font-size: 0.8rem; }
        @media (max-width: 780px) { .nav { flex-direction: column; gap: 12px; } h1 { font-size: 2.2rem; } }
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.5s ease; }
        .reveal.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
